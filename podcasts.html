<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: #2a2d35;
    --accent: #e8f542;
    --accent2: #42f5a7;
    --text: #e8eaf0;
    --muted: #5a5f70;
    --danger: #f54263;
    --success: #42f5a7;
    --warn: #f5a742;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 24px;
  }

  .header {
    max-width: 900px;
    margin: 0 auto 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--accent);
    line-height: 1.1;
  }

  .header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.9rem;
    font-family: 'DM Mono', monospace;
  }

  .config-bar {
    max-width: 900px;
    margin: 0 auto 32px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .config-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  .config-item label { color: var(--muted); }

  .config-item input {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    width: 40px;
    text-align: center;
    outline: none;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: var(--accent);
    color: #0e0f11;
  }
  .btn-primary:hover:not(:disabled) { background: #d4df2f; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-export {
    background: var(--accent2);
    color: #0e0f11;
  }
  .btn-export:hover:not(:disabled) { background: #2de095; transform: translateY(-1px); }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .progress-section {
    max-width: 900px;
    margin: 0 auto 24px;
    display: none;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .stats-row {
    max-width: 900px;
    margin: 0 auto 32px;
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .table-section { max-width: 900px; margin: 0 auto; display: none; }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .table-title {
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--accent2);
  }

  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .tag-active { background: rgba(66,245,167,0.15); color: var(--accent2); border: 1px solid rgba(66,245,167,0.3); }
  .tag-inactive { background: rgba(245,66,99,0.12); color: var(--danger); border: 1px solid rgba(245,66,99,0.25); }
  .tag-sheet { background: rgba(232,245,66,0.12); color: var(--accent); border: 1px solid rgba(232,245,66,0.25); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
  }

  thead th {
    text-align: left;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    position: sticky;
    top: 0;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: rgba(255,255,255,0.03); }

  tbody td {
    padding: 9px 14px;
    vertical-align: middle;
  }

  .td-title { font-weight: 600; max-width: 280px; }
  .td-date { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .td-days { font-family: 'DM Mono', monospace; font-size: 0.82rem; }

  .days-ok { color: var(--accent2); }
  .days-warn { color: var(--warn); }
  .days-bad { color: var(--danger); }

  .error-text { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--danger); }

  .actions-row {
    max-width: 900px;
    margin: 24px auto 0;
    display: none;
    gap: 12px;
  }

  .filter-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .filter-btn {
    padding: 8px 16px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--border);
    color: var(--text);
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0e0f11;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Filtre Podcasts Actifs</h1>
  <p>Europe 1 — Analyse des flux RSS Audiomeans · 179 podcasts (Podcasts + Merges)</p>
</div>

<div class="config-bar">
  <div class="config-item">
    <label>Seuil d'activité :</label>
    <input type="number" id="days" value="15" min="1" max="365" />
    <label>jours</label>
  </div>
  <button class="btn btn-primary" id="btnStart" onclick="startAnalysis()">
    ▶ Lancer l'analyse
  </button>
</div>

<div class="progress-section" id="progressSection">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progressText">Initialisation...</div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card">
    <div class="stat-num" id="s-total" style="color:var(--text)">—</div>
    <div class="stat-label">Total analysés</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="s-active" style="color:var(--accent2)">—</div>
    <div class="stat-label">Actifs ≤ seuil</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="s-inactive" style="color:var(--danger)">—</div>
    <div class="stat-label">Inactifs / anciens</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="s-error" style="color:var(--warn)">—</div>
    <div class="stat-label">Erreurs flux</div>
  </div>
</div>

<div class="actions-row" id="actionsRow" style="display:none; flex-wrap:wrap; align-items:center;">
  <div class="filter-toggle">
    <button class="filter-btn active" onclick="setFilter('all')">Tous</button>
    <button class="filter-btn" onclick="setFilter('active')">Actifs</button>
    <button class="filter-btn" onclick="setFilter('inactive')">Inactifs</button>
    <button class="filter-btn" onclick="setFilter('error')">Erreurs</button>
  </div>
  <button class="btn btn-export" id="btnExport" onclick="exportExcel()" disabled>
    ⬇ Exporter Excel (actifs uniquement)
  </button>
</div>

<div class="table-section" id="tableSection">
  <div class="table-header">
    <span class="table-title" id="tableTitle">Résultats</span>
  </div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Titre</th>
        <th>Feuille</th>
        <th>Dernier épisode</th>
        <th>Âge (j)</th>
        <th>Statut</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

let results = [];
let currentFilter = 'all';

async function fetchLastEpisodeDate(flux) {
  try {
    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(flux)}&count=1`;
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.status !== 'ok' || !data.items?.length) return null;
    const pub = data.items[0].pubDate;
    return pub ? new Date(pub) : null;
  } catch(e) {
    return undefined; // undefined = error
  }
}

function daysDiff(d) {
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

async function startAnalysis() {
  const btn = document.getElementById('btnStart');
  const days = parseInt(document.getElementById('days').value) || 15;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analyse en cours...';

  results = [];
  document.getElementById('progressSection').style.display = 'block';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('tableSection').style.display = 'none';
  document.getElementById('actionsRow').style.display = 'none';

  const total = PODCASTS.length;
  let done = 0;

  // Process in batches of 5
  const BATCH = 5;
  for (let i = 0; i < PODCASTS.length; i += BATCH) {
    const batch = PODCASTS.slice(i, i + BATCH);
    const batchResults = await Promise.all(batch.map(async (p) => {
      const date = await fetchLastEpisodeDate(p.flux);
      return { ...p, lastDate: date };
    }));
    results.push(...batchResults);
    done += batch.length;
    const pct = Math.round((done / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done} / ${total} flux analysés…`;
    renderTable(days);
  }

  document.getElementById('progressText').textContent = `✓ Analyse terminée — ${total} podcasts vérifiés`;
  document.getElementById('statsRow').style.display = 'grid';
  document.getElementById('actionsRow').style.display = 'flex';
  document.getElementById('btnExport').disabled = false;

  const active = results.filter(r => r.lastDate && r.lastDate !== undefined && daysDiff(r.lastDate) <= days);
  const inactive = results.filter(r => r.lastDate && daysDiff(r.lastDate) > days);
  const errors = results.filter(r => r.lastDate === undefined || r.lastDate === null);

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-active').textContent = active.length;
  document.getElementById('s-inactive').textContent = inactive.length;
  document.getElementById('s-error').textContent = errors.length;

  btn.disabled = false;
  btn.innerHTML = '↻ Relancer';

  renderTable(days);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const days = parseInt(document.getElementById('days').value) || 15;
  renderTable(days);
}

function renderTable(days) {
  const tbody = document.getElementById('tableBody');
  const section = document.getElementById('tableSection');
  section.style.display = 'block';

  let filtered = results;
  if (currentFilter === 'active') filtered = results.filter(r => r.lastDate && r.lastDate !== undefined && daysDiff(r.lastDate) <= days);
  else if (currentFilter === 'inactive') filtered = results.filter(r => r.lastDate && daysDiff(r.lastDate) > days);
  else if (currentFilter === 'error') filtered = results.filter(r => r.lastDate === undefined || r.lastDate === null);

  document.getElementById('tableTitle').textContent = `${filtered.length} podcast${filtered.length>1?'s':''} affichés`;

  tbody.innerHTML = filtered.map((r, i) => {
    let dateStr = '—', daysStr = '—', statusHtml = '';
    if (r.lastDate === undefined) {
      statusHtml = '<span class="tag tag-inactive">Erreur flux</span>';
      dateStr = '<span class="error-text">Erreur réseau</span>';
    } else if (r.lastDate === null) {
      statusHtml = '<span class="tag tag-inactive">Vide</span>';
      dateStr = '<span class="error-text">Aucun épisode</span>';
    } else {
      const d = daysDiff(r.lastDate);
      dateStr = r.lastDate.toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'});
      const dClass = d <= days ? 'days-ok' : d <= days*2 ? 'days-warn' : 'days-bad';
      daysStr = `<span class="${dClass}">${d}j</span>`;
      statusHtml = d <= days
        ? '<span class="tag tag-active">Actif</span>'
        : '<span class="tag tag-inactive">Inactif</span>';
    }
    return `<tr>
      <td class="td-date">${i+1}</td>
      <td class="td-title">${r.titre}</td>
      <td><span class="tag tag-sheet">${r.sheet}</span></td>
      <td class="td-date">${dateStr}</td>
      <td class="td-days">${daysStr}</td>
      <td>${statusHtml}</td>
    </tr>`;
  }).join('');
}

function exportExcel() {
  const days = parseInt(document.getElementById('days').value) || 15;
  const actifs = results.filter(r => r.lastDate && r.lastDate !== undefined && daysDiff(r.lastDate) <= days);

  const wb = XLSX.utils.book_new();

  // Sheet: Podcasts actifs
  const podsActifs = actifs.filter(r => r.sheet === 'Podcasts');
  const mergesActifs = actifs.filter(r => r.sheet === 'Merges');

  const makeRows = (arr) => arr.map(r => ({
    'Audiomeans ID': r.id,
    'Titre': r.titre,
    'Flux': r.flux,
    'Dernier épisode': r.lastDate.toLocaleDateString('fr-FR'),
    'Âge (jours)': daysDiff(r.lastDate)
  }));

  const ws1 = XLSX.utils.json_to_sheet(makeRows(podsActifs));
  ws1['!cols'] = [{wch:38},{wch:60},{wch:70},{wch:16},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Podcasts');

  const ws2 = XLSX.utils.json_to_sheet(makeRows(mergesActifs));
  ws2['!cols'] = [{wch:38},{wch:60},{wch:70},{wch:16},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Merges');

  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Europe1_Podcasts_Actifs_${days}j_${today}.xlsx`);
}
