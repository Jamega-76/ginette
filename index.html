<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --ink: #1A1A18;
    --ink-muted: #8A8880;
    --accent: #D4A853;
    --accent-light: #F9F0DC;
    --border: #E8E5DF;
    --podcast: #4A6FA5;
    --podcast-light: #EBF0F8;
    --article: #5A8A5A;
    --article-light: #EBF3EB;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 40px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 56px;
  }

  .logo-area h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }

  .logo-area .title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    text-align: right;
    line-height: 1.8;
  }

  /* Feed input section */
  .feed-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 40px;
  }

  .feed-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 16px;
  }

  .feeds-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .feed-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feed-input {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .feed-input:focus { border-color: var(--accent); }
  .feed-input::placeholder { color: var(--ink-muted); }

  .feed-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: 400;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    outline: none;
  }

  .badge-article { background: var(--article-light); color: var(--article); }
  .badge-podcast { background: var(--podcast-light); color: var(--podcast); }

  .remove-btn {
    width: 28px; height: 28px;
    border: none; background: none;
    color: var(--ink-muted);
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }
  .remove-btn:hover { background: #FEE; color: #C55; }

  .feed-actions {
    display: flex;
    gap: 10px;
  }

  .btn-add {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 9px 18px;
    border: 1px solid var(--border);
    background: none;
    border-radius: 6px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-add:hover { border-color: var(--ink-muted); color: var(--ink); }

  .btn-fetch {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 24px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-fetch:hover { background: #333; }
  .btn-fetch:active { transform: scale(0.98); }
  .btn-fetch:disabled { background: var(--ink-muted); cursor: not-allowed; }

  /* Stats strip */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .stats-strip.visible { opacity: 1; }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 26px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-card.stat-today { border-color: var(--accent); background: var(--accent-light); }
  .stat-card.stat-today .stat-big { color: #9A6F00; }

  .stat-card.stat-yesterday { border-color: var(--border); }
  .stat-card.stat-yesterday .stat-big { color: var(--ink); }

  .stat-card.stat-avg { border-color: var(--border); }
  .stat-card.stat-avg .stat-big { color: var(--ink-muted); }

  .stat-card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .stat-big {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .stat-breakdown {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .pill-article { background: var(--article-light); color: var(--article); }
  .pill-podcast  { background: var(--podcast-light); color: var(--podcast); }

  .stat-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    line-height: 1.5;
  }

  /* 5-day grid chart */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 0.4s 0.1s;
  }
  .chart-section.visible { opacity: 1; }

  .chart-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .chart-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .chart-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 4px;
  }

  .legend { display: flex; gap: 18px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-muted);
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .five-day-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }

  .day-col {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .day-col.today {
    background: var(--accent-light);
    border: 1px solid var(--accent);
  }

  .day-col-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .day-col.today .day-col-date {
    color: #9A6F00;
    font-weight: 700;
  }

  .day-col-total {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--ink);
  }

  .day-col.today .day-col-total { color: #9A6F00; }

  .day-col-breakdown {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .day-col-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
  }

  .day-col-line .type-dot {
    width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0;
  }

  .day-col-line .type-label { color: var(--ink-muted); flex: 1; margin-left: 5px; }
  .day-col-line .type-count { font-weight: 700; color: var(--ink); }

  /* Sources */
  .sources-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    opacity: 0;
    transition: opacity 0.4s 0.2s;
  }
  .sources-section.visible { opacity: 1; }

  .sources-header {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 18px;
  }

  .source-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .source-row:last-child { border-bottom: none; }

  .source-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .source-type {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
  }

  .source-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    text-align: right;
    white-space: nowrap;
  }

  /* Loading */
  .loading-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    z-index: 100;
  }

  .status-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 12px;
    min-height: 16px;
    text-align: center;
  }

  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #C55;
    background: #FEE;
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="logo-area">
    <h1>Flux Monitor</h1>
    <div class="title">Publications / Jour</div>
  </div>
  <div class="header-meta" id="headerMeta">
    Aucune donnée chargée
  </div>
</header>

<!-- Feed inputs -->
<div class="feed-section">
  <div class="feed-section-label">Flux RSS à analyser</div>
  <div class="feeds-list" id="feedsList"></div>
  <div class="feed-actions">
    <button class="btn-add" onclick="addFeedRow()">+ Ajouter un flux</button>
    <button class="btn-fetch" id="fetchBtn" onclick="fetchAll()">Analyser</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<!-- Stats -->
<div class="stats-strip" id="statsStrip">

  <!-- Aujourd'hui -->
  <div class="stat-card stat-today">
    <div class="stat-card-label">Aujourd'hui</div>
    <div class="stat-big" id="statToday">—</div>
    <div class="stat-breakdown">
      <span class="pill pill-article" id="statTodayArticles">— articles</span>
      <span class="pill pill-podcast" id="statTodayPodcasts">— podcasts</span>
    </div>
    <div class="stat-meta" id="statTodayMeta">—</div>
  </div>

  <!-- Hier -->
  <div class="stat-card stat-yesterday">
    <div class="stat-card-label">Hier</div>
    <div class="stat-big" id="statYesterday">—</div>
    <div class="stat-breakdown">
      <span class="pill pill-article" id="statYesterdayArticles">— articles</span>
      <span class="pill pill-podcast" id="statYesterdayPodcasts">— podcasts</span>
    </div>
    <div class="stat-meta" id="statYesterdayMeta">—</div>
  </div>

  <!-- Moyenne 5 jours -->
  <div class="stat-card stat-avg">
    <div class="stat-card-label">Moyenne · 5 derniers jours</div>
    <div class="stat-big" id="statAvg">—</div>
    <div class="stat-breakdown">
      <span class="pill pill-article" id="statAvgArticles">— articles</span>
      <span class="pill pill-podcast" id="statAvgPodcasts">— podcasts</span>
    </div>
    <div class="stat-meta" id="statAvgMeta">—</div>
  </div>

</div>

<!-- Graphique 5 jours -->
<div class="chart-section" id="chartSection">
  <div class="chart-header">
    <div>
      <div class="chart-title">5 derniers jours</div>
      <div class="chart-subtitle" id="chartSubtitle">—</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--article)"></div>Articles</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--podcast)"></div>Podcasts</div>
    </div>
  </div>
  <div class="five-day-grid" id="fiveDayGrid"></div>
</div>

<!-- Sources -->
<div class="sources-section" id="sourcesSection">
  <div class="sources-header">Sources</div>
  <div id="sourcesList"></div>
</div>

<script>
const DEFAULT_FEEDS = [
  { url: 'https://www.europe1.fr/rss/politique', type: 'article' },
];

let feedRows = [];

function init() {
  DEFAULT_FEEDS.forEach(f => addFeedRow(f.url, f.type));
}

function addFeedRow(url = '', type = 'article') {
  const id = Date.now() + Math.random();
  feedRows.push({ id, url, type });
  renderFeeds();
}

function removeFeedRow(id) {
  feedRows = feedRows.filter(r => r.id !== id);
  renderFeeds();
}

function toggleType(id) {
  const row = feedRows.find(r => r.id === id);
  if (row) {
    row.type = row.type === 'article' ? 'podcast' : 'article';
    renderFeeds();
  }
}

function renderFeeds() {
  const container = document.getElementById('feedsList');
  container.innerHTML = '';
  feedRows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'feed-row';
    div.innerHTML = `
      <input class="feed-input" type="url" placeholder="https://example.com/rss.xml" 
        value="${row.url}" 
        oninput="updateUrl(${row.id}, this.value)" />
      <button class="feed-type-badge ${row.type === 'article' ? 'badge-article' : 'badge-podcast'}" 
        onclick="toggleType(${row.id})" title="Cliquer pour changer le type">
        ${row.type === 'article' ? '📰 article' : '🎙 podcast'}
      </button>
      <button class="remove-btn" onclick="removeFeedRow(${row.id})">×</button>
    `;
    container.appendChild(div);
  });
}

function updateUrl(id, val) {
  const row = feedRows.find(r => r.id === id);
  if (row) row.url = val;
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

function setLoading(pct) {
  document.getElementById('loadingBar').style.width = pct + '%';
}

// Retourne la date locale Paris au format YYYY-MM-DD
function toParisDateKey(d) {
  return d.toLocaleDateString('fr-CA', { timeZone: 'Europe/Paris' });
}

async function fetchFeed(url) {
  // corsproxy.io retourne le contenu brut, parfait pour le XML
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
  const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  if (!text || text.trim().length === 0) throw new Error('Réponse vide');
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'application/xml');
  if (xml.querySelector('parsererror')) throw new Error('XML invalide');
  return xml;
}

function parseItems(xml) {
  const results = [];
  const items = xml.querySelectorAll('item, entry');
  items.forEach(item => {
    const dateNode = item.querySelector('pubDate')
                  || item.querySelector('published')
                  || item.querySelector('updated');
    if (!dateNode) return;
    const d = new Date(dateNode.textContent.trim());
    if (isNaN(d)) return;
    const dayKey = toParisDateKey(d);
    const title = item.querySelector('title')?.textContent?.trim() || '';
    // Détection podcast : enclosure avec type audio ou url .mp3
    const enclosure = item.querySelector('enclosure');
    const encType = enclosure?.getAttribute('type') || '';
    const encUrl  = enclosure?.getAttribute('url')  || '';
    const isPodcast = encType.startsWith('audio') || encUrl.includes('.mp3');
    results.push({ date: dayKey, title, dateObj: d, isPodcast });
  });
  return results;
}

function getFeedTitle(xml, fallbackUrl) {
  const t = xml.querySelector('channel > title, feed > title');
  return t ? t.textContent.trim() : fallbackUrl;
}

async function fetchAll() {
  const feeds = feedRows.filter(r => r.url.trim());
  if (!feeds.length) { setStatus('Aucun flux à analyser.'); return; }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  setLoading(10);
  setStatus('Chargement des flux…');

  // Hide panels
  ['statsStrip','chartSection','sourcesSection'].forEach(id => {
    document.getElementById(id).classList.remove('visible');
  });

  const allData = []; // { dayKey, type, title, source }
  const sources = [];

  for (let i = 0; i < feeds.length; i++) {
    const f = feeds[i];
    setStatus(`Analyse de ${f.url.replace('https://', '').slice(0, 50)}…`);
    setLoading(10 + (i / feeds.length) * 75);
    try {
      const xml = await fetchFeed(f.url);
      const title = getFeedTitle(xml, f.url);
      const items = parseItems(xml);
      // isPodcast : détection auto via mp3, sinon fallback sur le type choisi par l'utilisateur
      items.forEach(it => {
        const type = it.isPodcast ? 'podcast' : (f.type === 'podcast' ? 'podcast' : 'article');
        allData.push({ ...it, type, source: title });
      });
      console.log(`[${title}] ${items.length} items`, items.slice(0,3).map(i => i.date + ' ' + (i.isPodcast?'🎙':'📰') + ' ' + i.title.slice(0,30)));
      sources.push({ title, type: f.type, count: items.length, url: f.url });
    } catch(e) {
      sources.push({ title: f.url, type: f.type, count: 0, error: e.message, url: f.url });
      console.warn('Feed error:', f.url, e);
    }
  }

  setLoading(100);
  setStatus('');

  if (!allData.length) {
    setStatus('Aucun élément trouvé. Vérifiez les URLs ou la connexion.');
    btn.disabled = false;
    setTimeout(() => setLoading(0), 500);
    return;
  }

  renderDashboard(allData, sources);
  btn.disabled = false;
  setTimeout(() => setLoading(0), 600);
}

function dayStats(allData, key) {
  const d = allData.filter(x => x.date === key);
  return {
    total: d.length,
    articles: d.filter(x => x.type === 'article').length,
    podcasts: d.filter(x => x.type === 'podcast').length,
  };
}

function offsetDay(baseKey, offset) {
  const d = new Date(baseKey + 'T12:00:00');
  d.setDate(d.getDate() + offset);
  return toParisDateKey(d);
}

function renderDashboard(allData, sources) {
  const now = new Date();
  const todayKey     = toParisDateKey(now);
  const yesterdayKey = offsetDay(todayKey, -1);
  const analysisTime = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const analysisDate = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });

  // Today
  const td = dayStats(allData, todayKey);
  document.getElementById('statToday').textContent = td.total;
  document.getElementById('statTodayArticles').textContent = `${td.articles} article${td.articles !== 1 ? 's' : ''}`;
  document.getElementById('statTodayPodcasts').textContent = `${td.podcasts} podcast${td.podcasts !== 1 ? 's' : ''}`;
  document.getElementById('statTodayMeta').textContent = `${analysisDate} · ${analysisTime}`;

  // Yesterday
  const yd = dayStats(allData, yesterdayKey);
  document.getElementById('statYesterday').textContent = yd.total;
  document.getElementById('statYesterdayArticles').textContent = `${yd.articles} article${yd.articles !== 1 ? 's' : ''}`;
  document.getElementById('statYesterdayPodcasts').textContent = `${yd.podcasts} podcast${yd.podcasts !== 1 ? 's' : ''}`;
  document.getElementById('statYesterdayMeta').textContent = formatDateLong(yesterdayKey);

  // 5-day average (yesterday back 4 more days = 5 days total, excludes today)
  const last5Keys = [0,-1,-2,-3,-4].map(o => offsetDay(yesterdayKey, o));
  const last5 = last5Keys.map(k => dayStats(allData, k));
  const avgTotal    = (last5.reduce((s,d) => s + d.total,    0) / 5).toFixed(1);
  const avgArticles = (last5.reduce((s,d) => s + d.articles, 0) / 5).toFixed(1);
  const avgPodcasts = (last5.reduce((s,d) => s + d.podcasts, 0) / 5).toFixed(1);
  document.getElementById('statAvg').textContent = avgTotal;
  document.getElementById('statAvgArticles').textContent = `${avgArticles} articles`;
  document.getElementById('statAvgPodcasts').textContent = `${avgPodcasts} podcasts`;
  document.getElementById('statAvgMeta').textContent =
    `${formatDateLong(last5Keys[4])} → ${formatDateLong(last5Keys[0])}`;

  // Header
  document.getElementById('headerMeta').innerHTML =
    `${sources.length} flux · Analysé à ${analysisTime}`;
  document.getElementById('chartSubtitle').textContent =
    `${formatDateLong(last5Keys[4])} → ${analysisDate}`;

  // 5-day grid (last 4 days + today)
  const gridKeys = [offsetDay(todayKey,-4), offsetDay(todayKey,-3), offsetDay(todayKey,-2), yesterdayKey, todayKey];
  const grid = document.getElementById('fiveDayGrid');
  grid.innerHTML = '';
  gridKeys.forEach(key => {
    const s = dayStats(allData, key);
    const isToday = key === todayKey;
    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '');
    col.innerHTML = `
      <div class="day-col-date">${isToday ? '— Aujourd\'hui' : formatDateLong(key)}</div>
      <div class="day-col-total">${s.total}</div>
      <div class="day-col-breakdown">
        <div class="day-col-line">
          <div class="type-dot" style="background:var(--article)"></div>
          <span class="type-label">Articles</span>
          <span class="type-count" style="color:var(--article)">${s.articles}</span>
        </div>
        <div class="day-col-line">
          <div class="type-dot" style="background:var(--podcast)"></div>
          <span class="type-label">Podcasts</span>
          <span class="type-count" style="color:var(--podcast)">${s.podcasts}</span>
        </div>
      </div>
    `;
    grid.appendChild(col);
  });

  // Sources list
  const sourcesList = document.getElementById('sourcesList');
  sourcesList.innerHTML = '';
  sources.forEach(s => {
    const row = document.createElement('div');
    row.className = 'source-row';
    row.innerHTML = `
      <div class="source-name" title="${s.url}">${s.error ? '⚠ ' : ''}${s.title}</div>
      <div class="source-type pill ${s.type === 'article' ? 'pill-article' : 'pill-podcast'}">
        ${s.type === 'article' ? '📰 article' : '🎙 podcast'}
      </div>
      <div class="source-count">${s.error
        ? `<span style="color:#C55;font-size:10px">${s.error}</span>`
        : `${s.count} items`
      }</div>
    `;
    sourcesList.appendChild(row);
  });

  // Reveal
  setTimeout(() => {
    document.getElementById('statsStrip').classList.add('visible');
    document.getElementById('chartSection').classList.add('visible');
    document.getElementById('sourcesSection').classList.add('visible');
  }, 50);
}

function formatDateLong(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', timeZone: 'Europe/Paris' });
}

init();
</script>
</body>
</html>
